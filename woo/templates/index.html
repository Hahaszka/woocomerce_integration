<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WooCommerce Product Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">WooCommerce Product Manager</h2>
    <p class="text-muted mb-4">You need to set the API keys in your .env or docker-compose to connect to your local WooCommerce instance. If the table below fails to load, verify API credentials and ensure WooCommerce is active on your WordPress installation.</p>
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAddModal()">Add Product</button>
    <div class="table-responsive">
        <table id="productsTable" class="table table-striped table-bordered" style="width:100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Images</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="productForm">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalLabel">Add Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="productId">
            <div class="mb-3">
              <label for="productName" class="form-label">Name</label>
              <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="mb-3">
              <label for="productPrice" class="form-label">Regular Price</label>
              <input type="number" step="0.01" class="form-control" id="productPrice" required>
            </div>
            <div class="mb-3">
              <label for="productImages" class="form-label">Image URLs (comma separated)</label>
              <textarea class="form-control" id="productImages" rows="2" placeholder="https://example.com/img1.jpg, https://example.com/img2.jpg"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
          </div>
      </form>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
let table;

$(document).ready(function() {
    table = $('#productsTable').DataTable({
        ajax: {
            url: '/api/products',
            dataSrc: '',
            error: function(xhr, error, thrown) {
                alert('Warning: Connection to WooCommerce API failed. Please ensure API settings are correct.');
            }
        },
        columns: [
            { data: 'id' },
            { data: 'name' },
            { data: 'regular_price' },
            {
                data: 'images',
                render: function(images) {
                    if (images && images.length > 0) {
                        return `<img src="${images[0].src}" style="height: 40px; width: 40px; object-fit: cover;" class="img-thumbnail" alt="product">`;
                    }
                    return '<span class="text-muted">No Image</span>';
                }
            },
            {
                data: null,
                render: function(data, type, row) {
                    return `<button class="btn btn-sm btn-warning me-1" onclick='openEditModal(${JSON.stringify(row).replace(/'/g, "&apos;")})'>Edit</button>
                            <button class="btn btn-sm btn-danger" onclick='deleteProduct(${row.id})'>Delete</button>`;
                }
            }
        ]
    });

    $('#productForm').submit(function(e) {
        e.preventDefault();
        const id = $('#productId').val();
        const name = $('#productName').val();
        const price = $('#productPrice').val();
        const imagesRaw = $('#productImages').val();
        const images = imagesRaw ? imagesRaw.split(',').filter(s => s.trim() !== "").map(src => ({src: src.trim()})) : [];

        const url = id ? `/api/products/${id}` : '/api/products';
        const method = id ? 'PUT' : 'POST';

        $.ajax({
            url: url,
            method: method,
            contentType: 'application/json',
            data: JSON.stringify({name: name, regular_price: price, images: images}),
            success: function() {
                $('#productModal').modal('hide');
                table.ajax.reload();
            },
            error: function(err) {
                alert('Error processing request: ' + (err.responseJSON?.detail || 'Unknown error'));
                console.error(err);
            }
        });
    });
});

function openAddModal() {
    $('#productModalLabel').text('Add Product');
    $('#productId').val('');
    $('#productName').val('');
    $('#productPrice').val('');
    $('#productImages').val('');
}

function openEditModal(row) {
    $('#productModalLabel').text('Edit Product');
    $('#productId').val(row.id);
    $('#productName').val(row.name);
    $('#productPrice').val(row.regular_price);
    const imagesStr = row.images ? row.images.map(img => img.src).join(', ') : '';
    $('#productImages').val(imagesStr);
    $('#productModal').modal('show');
}

function deleteProduct(id) {
    if(confirm('Are you sure you want to delete this product?')) {
        $.ajax({
            url: `/api/products/${id}`,
            method: 'DELETE',
            success: function() {
                table.ajax.reload();
            },
            error: function(err) {
                alert('Error deleting product: ' + (err.responseJSON?.detail || 'Unknown error'));
                console.error(err);
            }
        });
    }
}
</script>

</body>
</html>
